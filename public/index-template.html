<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ஸ்ரீ பெரியகாண்டி அம்மன் திருக்கோவில் - வீரப்பூர் | Veerappur Temple Official</title>
    <!-- SEO Meta Tags -->
    <meta name="description" content="ஸ்ரீ பெரியகாண்டி அம்மன் திருக்கோவில், வீரப்பூர், அண்ணன்மார் சாமி (பொன்னர் - சங்கர்) வீர வரலாற்று திருத்தலம் மற்றும் டிஜிட்டல் சேவை தளம்.">
    <meta name="keywords" content="வீரப்பூர், பெரியகாண்டி அம்மன், பொன்னர் சங்கர், அண்ணன்மார் சாமி, வீரமலை, படுகளம், மாசி திருவிழா, தங்குமிடம் முன்பதிவு">
    <!-- Google Fonts: Mukta Malar (Tamil) & Outfit (English/Modern numbers) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mukta+Malar:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM (Local Offline Version) -->
    <script src="react.min.js"></script>
    <script src="react-dom.min.js"></script>
    
    <!-- Babel Standalone (Local Offline Version) -->
    <script src="babel.min.js"></script>
    
    <!-- Tailwind CSS (Local Offline Version) -->
    <script src="tailwind.min.js"></script>
    
    <!-- Tailwind Custom Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'Mukta Malar', 'sans-serif'],
                        tamil: ['Mukta Malar', 'sans-serif'],
                    },
                    colors: {
                        kumkum: {
                            light: '#B22222', // Firebrick
                            DEFAULT: '#800020', // Burgundy/Kumkum Red
                            dark: '#4A0010', // Deep Kumkum Black
                        },
                        gold: {
                            light: '#FFF099', // Bright gold
                            DEFAULT: '#D4AF37', // Traditional gold
                            dark: '#A67C1E', // Antique gold
                        },
                        turmeric: {
                            light: '#FFE066',
                            DEFAULT: '#FFC30B', // Turmeric Yellow
                            dark: '#CC9600',
                        },
                        stone: {
                            light: '#2A2A2A',
                            DEFAULT: '#121212', // Stone Black
                            dark: '#0A0A0A',
                        }
                    },
                    boxShadow: {
                        'gold': '0 4px 20px rgba(212, 175, 55, 0.15)',
                        'gold-lg': '0 10px 25px rgba(212, 175, 55, 0.3)',
                        'kumkum': '0 4px 20px rgba(128, 0, 32, 0.25)',
                    }
                }
            }
        }
    </script>
    
    <style type="text/css">
        /* Custom styling for a premium temple feel */
        body {
            background-color: #0A0A0A;
            color: #E2E8F0;
            overflow-x: hidden;
            font-family: 'Mukta Malar', 'Outfit', sans-serif;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0A0A0A;
        }
        ::-webkit-scrollbar-thumb {
            background: #800020;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #D4AF37;
        }

        /* Gold Gradient Text */
        .text-gold-gradient {
            background: linear-gradient(135deg, #FFF099 0%, #D4AF37 50%, #A67C1E 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Gold Border Glow */
        .gold-border-glow {
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
            transition: all 0.3s ease;
        }
        .gold-border-glow:hover {
            border: 1px solid rgba(212, 175, 55, 0.6);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.25);
        }

        /* Kumkum Pattern Background */
        .bg-temple-pattern {
            background-color: #0A0A0A;
            background-image: 
                radial-gradient(rgba(128, 0, 32, 0.15) 1px, transparent 0),
                radial-gradient(rgba(212, 175, 55, 0.08) 1px, transparent 0);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px;
        }

        /* Traditional Pillar Style Border */
        .border-pillar-left {
            border-left: 4px double #D4AF37;
        }
        .border-pillar-right {
            border-right: 4px double #D4AF37;
        }

        /* Opening Loader animation */
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }
        .pulse-logo {
            animation: pulse-ring 3s infinite ease-in-out;
        }

        /* Slide Transition CSS */
        .page-transition {
            animation: fadeIn 0.6s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-temple-pattern">
    <div id="root"></div>

    <!-- Main React JSX script placeholder -->
    <script type="text/babel" src="app.jsx"></script>
</body>
</html>
