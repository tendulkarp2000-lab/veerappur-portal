// Synthesized Temple Bell Audio (Web Audio API)
// ----------------------------------------------------
const playBellChime = () => {
    try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        
        const playTone = (freq, startTime, duration, volume) => {
            const osc = ctx.createOscillator();
            const gainNode = ctx.createGain();
            
            osc.type = freq > 400 ? 'sine' : 'triangle';
            osc.frequency.setValueAtTime(freq, startTime);
            osc.frequency.exponentialRampToValueAtTime(freq * 0.98, startTime + duration);
            
            gainNode.gain.setValueAtTime(volume, startTime);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
            
            osc.connect(gainNode);
            gainNode.connect(ctx.destination);
            
            osc.start(startTime);
            osc.stop(startTime + duration);
        };
        
        playTone(293.66, ctx.currentTime, 3.0, 0.4); // D4
        playTone(440.00, ctx.currentTime, 2.5, 0.2); // A4
        playTone(587.33, ctx.currentTime, 2.5, 0.15); // D5
        
        playTone(329.63, ctx.currentTime + 0.3, 2.7, 0.35); // E4
        playTone(493.88, ctx.currentTime + 0.3, 2.2, 0.18); // B4
        playTone(659.25, ctx.currentTime + 0.3, 2.2, 0.1); // E5
    } catch (e) {
        console.warn("Audio Context blocked or not supported yet", e);
    }
};

// Tamil Voice Narrator (Web Speech API)
// ----------------------------------------------------
const speakTamilText = (text, isSpeaking, setIsSpeaking) => {
    if (!('speechSynthesis' in window)) {
        alert("உங்களது உலாவி (Browser) குரல் வாசிப்பு வசதியை ஆதரிக்கவில்லை.");
        return;
    }

    if (isSpeaking) {
        window.speechSynthesis.cancel();
        setIsSpeaking(false);
        return;
    }

    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'ta-IN';
    
    const voices = window.speechSynthesis.getVoices();
    const tamilVoice = voices.find(v => v.lang.includes('ta') || v.lang.includes('TA'));
    if (tamilVoice) {
        utterance.voice = tamilVoice;
    }
    
    utterance.rate = 0.85;
    utterance.pitch = 1.0;
    
    utterance.onend = () => setIsSpeaking(false);
    utterance.onerror = () => setIsSpeaking(false);

    setIsSpeaking(true);
    window.speechSynthesis.speak(utterance);
};

        const festivalsList = db.festivals || [];
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        
        // Filter future festivals and sort by date ascending
        const upcoming = festivalsList
            .filter(fest => {
                const festDate = new Date(fest.date);
                festDate.setHours(0, 0, 0, 0);
                return festDate >= today;
            })
            .sort((a, b) => new Date(a.date) - new Date(b.date));
            
        if (upcoming.length > 0) {
            return upcoming[0];
        }
        return null;
    };

    const countdownDate = nextFest ? nextFest.date : (db.festivalCountdownDate || "2027-03-02");

// ----------------------------------------------------
// Component: Countdown Timer
// ----------------------------------------------------
function FestivalCountdown({ date }) {
    const calculateTimeLeft = () => {
        const difference = +new Date(date) - +new Date();
        let timeLeft = {};

        if (difference > 0) {
            timeLeft = {
                days: Math.floor(difference / (1000 * 60 * 60 * 24)),
                hours: Math.floor((difference / (1000 * 60 * 60)) % 24),
                minutes: Math.floor((difference / 1000 / 60) % 60),
                seconds: Math.floor((difference / 1000) % 60)
            };
        }
        return timeLeft;
    };

    const [timeLeft, setTimeLeft] = useState(calculateTimeLeft());

    useEffect(() => {
        const timer = setTimeout(() => {
            setTimeLeft(calculateTimeLeft());
        }, 1000);
        return () => clearTimeout(timer);
    });

    const formatNumber = (num) => String(num || 0).padStart(2, '0');

    return (
        <div className="flex gap-4 sm:gap-6 justify-center my-6">
            {[
                { label: "நாட்கள்", val: timeLeft.days, word: "Days" },
                { label: "மணிநேரம்", val: timeLeft.hours, word: "Hours" },
                { label: "நிமிடங்கள்", val: timeLeft.minutes, word: "Mins" },
                { label: "விநாடிகள்", val: timeLeft.seconds, word: "Secs" }
            ].map((unit, i) => (
                <div key={i} className="flex flex-col items-center">
                    <div className="w-16 h-16 sm:w-20 sm:h-20 bg-stone border border-gold/40 rounded-lg flex items-center justify-center font-bold text-2xl sm:text-3xl text-gold-gradient shadow-gold font-mono">
                        {formatNumber(unit.val)}
                    </div>
                    <span className="text-[10px] sm:text-xs text-slate-400 font-tamil mt-2">{unit.label}</span>
                </div>
            ))}
        </div>
    );
}

// Component: Services Booking & Facility Page
// ----------------------------------------------------
function ServicesPage({ t, language, db, saveState }) {
    const [tab, setTab] = useState('rooms');
    const [statusMsg, setStatusMsg] = useState("");

    // Form inputs state
    const [name, setName] = useState("");
    const [phone, setPhone] = useState("");
    const [date, setDate] = useState("");
    const [count, setCount] = useState("");
    const [reqs, setReqs] = useState("");
    const [ooru, setOoru] = useState("");

    // Guide language separation
    const [guideLanguage, setGuideLanguage] = useState("Tamil");

    // Math Captcha state
    const [captchaNum1, setCaptchaNum1] = useState(Math.floor(Math.random() * 9) + 1);
    const [captchaNum2, setCaptchaNum2] = useState(Math.floor(Math.random() * 9) + 1);
    const [captchaInput, setCaptchaInput] = useState("");

    // Nakshatram & Address for Prasatham Seva
    const [nakshatram, setNakshatram] = useState("");
    const [rasi, setRasi] = useState("");
    const [deliveryAddress, setDeliveryAddress] = useState("");

    // Special Offerings checkbox checklist
    const [selectedServices, setSelectedServices] = useState({
        goat: false,
        cook: false,
        utensil: false,
        oven: false,
        water: false,
        shed: false,
        audio: false,
        chairTable: false,
        decor: false
    });

    // Transport vehicle selection
    const [vehicle, setVehicle] = useState("car");
    const [pickupType, setPickupType] = useState("railway");

    const resetForm = () => {
        setName("");
        setPhone("");
        setOoru("");
        setDate("");
        setCount("");
        setReqs("");
        setGuideLanguage("Tamil");
        setNakshatram("");
        setRasi("");
        setDeliveryAddress("");
        setSelectedServices({
            goat: false, cook: false, utensil: false, oven: false, water: false, shed: false, audio: false, chairTable: false, decor: false
        });
        
        // Regenerate captcha
        setCaptchaNum1(Math.floor(Math.random() * 9) + 1);
        setCaptchaNum2(Math.floor(Math.random() * 9) + 1);
        setCaptchaInput("");
    };

    const handleRoomSelectChange = (val) => {
        setReqs(val);
    };

    // Load dynamic rooms from database
    const roomList = db.rooms || [];
    
    // Auto-select first room in form state
    useEffect(() => {
        if (roomList.length > 0 && !reqs) {
            setReqs(roomList[0].name);
        }
    }, [roomList, reqs]);

    const selectedRoomDetails = roomList.find(r => r.name === reqs);

    const handleSubmitRequest = (e, requestType) => {
        e.preventDefault();
        
        // Name validation
        if (!name || name.trim().length < 3) {
            alert(language === 'ta' ? "பெயர் குறைந்தது 3 எழுத்துக்களைக் கொண்டிருக்க வேண்டும்." : "Name must be at least 3 characters.");
            return;
        }

        // Phone validation (10 digits starting with 6,7,8,9)
        const phoneRegex = /^[6789]\d{9}$/;
        if (!phone || !phoneRegex.test(phone)) {
            alert(language === 'ta' ? "சரியான 10 இலக்க போன் எண்ணை உள்ளிடவும் (e.g. 9876543210)." : "Please enter a valid 10-digit mobile number starting with 6-9.");
            return;
        }

        // Captcha validation
        if (parseInt(captchaInput) !== (captchaNum1 + captchaNum2)) {
            alert(language === 'ta' ? "பாதுகாப்பு விடை தவறானது. மீண்டும் முயற்சிக்கவும்." : "Incorrect security response. Please try again.");
            return;
        }

        if (!date) {
            alert(language === 'ta' ? "தேதி கட்டாயம் நிரப்பப்பட வேண்டும்." : "Date is required.");
            return;
        }

        let details = {};
        if (requestType === 'room') {
            details = { roomOption: reqs };
        } else if (requestType === 'mandapam') {
            details = { mandapamName: "ஸ்ரீ பொன்னர் சங்கர் கல்யாண மண்டபம்" };
        } else if (requestType === 'offering') {
            const list = Object.keys(selectedServices).filter(k => selectedServices[k]);
            details = { offeringServices: list };
        } else if (requestType === 'transport') {
            details = { vehicle, pickupType };
        } else if (requestType === 'guide') {
            details = { guideLanguage: guideLanguage || "Tamil" };
        } else if (requestType === 'prasatham') {
            details = { nakshatram, rasi, deliveryAddress };
        }

        const newRequest = {
            id: "req_" + Date.now(),
            type: requestType,
            name,
            phone,
            ooru,
            date,
            count: count || "1",
            details,
            status: "pending",
            createdAt: new Date().toISOString().split('T')[0]
        };

        const updatedDb = { ...db };
        updatedDb.bookings = [newRequest, ...(updatedDb.bookings || [])];
        saveState(updatedDb);

        setStatusMsg(language === 'ta' ? "முன்பதிவு கோரிக்கை வெற்றிகரமாக அனுப்பப்பட்டது! நிர்வாகி உங்களை தொடர்புகொள்வார்." : "Request submitted! Admin will contact you.");
        resetForm();
        setTimeout(() => setStatusMsg(""), 5000);
    };

    return (
        <div className="max-w-6xl mx-auto px-4 py-16 flex flex-col gap-12">
            <div className="text-center space-y-4">
                <span className="text-xs bg-kumkum/40 border border-gold/40 text-gold px-3.5 py-1 rounded-full font-tamil">பக்தர் சேவைகள்</span>
                <h2 className="text-3xl sm:text-5xl font-bold font-tamil text-gold-gradient">திருக்கோவில் சேவைகள் முன்பதிவு</h2>
            </div>

            <div className="flex flex-wrap border-b border-gold/30">
                {[
                    { id: "rooms", title: "தங்குமிடம் (Rooms)" },
                    { id: "mandapam", title: "மண்டபம் (Mandapam)" },
                    { id: "offerings", title: "நேர்த்திக்கடன் (Offerings)" },
                    { id: "transport", title: "போக்குவரத்து (Transport)" },
                    { id: "guide", title: "கைடு (Tourist Guide)" },
                    { id: "prasatham", title: "இலவச பிரசாதம் (Prasatham Delivery)" }
                ].map((t) => (
                    <button
                        key={t.id}
                        onClick={() => {
                            setTab(t.id);
                            resetForm();
                        }}
                        className={`py-3 px-4 sm:px-6 text-xs sm:text-sm font-semibold font-tamil border-b-2 transition-all ${
                            tab === t.id ? 'border-gold text-gold bg-kumkum/10' : 'border-transparent text-slate-400 hover:text-slate-200'
                        }`}
                    >
                        {t.title}
                    </button>
                ))}
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                
                {/* Details left panel */}
                <div className="lg:col-span-7 space-y-6">
                    {tab === 'rooms' && (
                        <div className="space-y-6">
                            <h3 className="text-xl font-bold text-gold font-tamil">{language === 'ta' ? "தங்கும் விடுதிகள் விபரங்கள்" : "Accommodation Details"}</h3>
                            
                            {/* Clickable Small Rooms List */}
                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                                {roomList.map((room) => {
                                    const isSelected = room.name === reqs;
                                    return (
                                        <div
                                            key={room.id}

                                                isSelected

                                    <div className="flex flex-col sm:flex-row justify-between items-start gap-4 border-b border-stone pb-4">
                                        <div>

function HelpDeskPage({ t, language, db, saveState }) {
    const [subTab, setSubTab] = useState('complaint');
    const [statusMsg, setStatusMsg] = useState("");

    // Math Captcha state for HelpDesk
    const [captchaNum1, setCaptchaNum1] = useState(Math.floor(Math.random() * 9) + 1);
    const [captchaNum2, setCaptchaNum2] = useState(Math.floor(Math.random() * 9) + 1);
    const [captchaInput, setCaptchaInput] = useState("");

    // Review inputs
    const [name, setName] = useState("");
    const [place, setPlace] = useState("");
    const [rating, setRating] = useState(5);
    const [exp, setExp] = useState("");

    // Complaint inputs
    const [category, setCategory] = useState("Temple cleanliness");
    const [complaintMsg, setComplaintMsg] = useState("");
    const [imageFile, setImageFile] = useState(null);
    const [base64Img, setBase64Img] = useState("");
    const [phone, setPhone] = useState("");

    const handleReviewSubmit = (e) => {
        e.preventDefault();
        if (!name || !exp) {
            alert("பெயர் மற்றும் கருத்து கட்டாயம் தேவை.");
            return;
        }

        const newReview = {
            id: "rev_" + Date.now(),
            name,
            place: place || "உள்ளூர்",
            rating,
            experience: exp,
            approved: false
        };

        const updatedDb = { ...db };
        updatedDb.reviews = [...(updatedDb.reviews || []), newReview];
        saveState(updatedDb);

        setName("");
        setPlace("");
        setRating(5);
        setExp("");
        setStatusMsg("கருத்து சமர்ப்பிக்கப்பட்டது! நிர்வாகி அனுமதிக்குப் பின் இணையதளத்தில் தோன்றும்.");
        setTimeout(() => setStatusMsg(""), 5000);
    };

    const handleFileChange = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        setImageFile(file);
        const reader = new FileReader();
        reader.onloadend = () => {
            setBase64Img(reader.result);
        };
        reader.readAsDataURL(file);
    };

    const handleComplaintSubmit = (e) => {
        e.preventDefault();
        
        // Name validation
        if (!name || name.trim().length < 3) {
            alert(language === 'ta' ? "பெயர் குறைந்தது 3 எழுத்துக்களைக் கொண்டிருக்க வேண்டும்." : "Name must be at least 3 characters.");
            return;
        }

        // Phone validation (10 digits starting with 6,7,8,9)
        const phoneRegex = /^[6789]\d{9}$/;
        if (!phone || !phoneRegex.test(phone)) {
            alert(language === 'ta' ? "சரியான 10 இலக்க போன் எண்ணை உள்ளிடவும் (e.g. 9876543210)." : "Please enter a valid 10-digit mobile number starting with 6-9.");
            return;
        }

        // Captcha validation
        if (parseInt(captchaInput) !== (captchaNum1 + captchaNum2)) {
            alert(language === 'ta' ? "பாதுகாப்பு விடை தவறானது. மீண்டும் முயற்சிக்கவும்." : "Incorrect security response. Please try again.");
            return;
        }

        if (!complaintMsg) {
            alert("புகார் செய்தியை உள்ளிடவும்.");
            return;
        }

        const submitComplaint = (imgUrl) => {
            const newComplaint = {
                id: "comp_" + Date.now(),
                name: name,
                phone: phone,
                category,
                message: complaintMsg,
                imageUrl: imgUrl || "",
                status: "open",
                date: new Date().toISOString().split('T')[0]
            };

            const updatedDb = { ...db };
            updatedDb.complaints = [...(updatedDb.complaints || []), newComplaint];
            saveState(updatedDb);

            setName("");
            setPhone("");
            setComplaintMsg("");
            setImageFile(null);
            setBase64Img("");
            
            // Regenerate captcha
            setCaptchaNum1(Math.floor(Math.random() * 9) + 1);
            setCaptchaNum2(Math.floor(Math.random() * 9) + 1);

            setTimeout(() => setStatusMsg(""), 5000);

        if (base64Img) {

                headers: { 'Content-Type': 'application/json' },

            })
            .then(res => res.json())
            .then(data => {
                submitComplaint(data.filePath);
            })
            .catch(err => {
                console.error("Image upload failed, falling back to inline base64", err);
                submitComplaint(base64Img);
            });

            submitComplaint("");
        }

                <h2 className="text-3xl sm:text-4xl font-bold font-tamil text-gold-gradient">பக்தர் உதவி மையம் (Help Center)</h2>
            </div>

            <div className="flex justify-center border-b border-stone-light">
                <button
                    onClick={() => {

                        setStatusMsg("");

                        subTab === 'complaint' ? 'border-gold text-gold' : 'border-transparent text-slate-400'

                >

                </button>
                <button
                    onClick={() => {
                        setSubTab('review');
                        setStatusMsg("");

                            <div>
                                <label className="block text-slate-300 font-tamil text-xs mb-1.5">தங்கள் பெயர் (Name) *</label>

                        <div>

                        <div>

                        <div>
                            <label className="block text-slate-300 font-tamil text-xs mb-1.5">
                                {language === 'ta' ? `பாதுகாப்பு கேள்வி: ${captchaNum1} + ${captchaNum2} = ? *` : `Security Question: ${captchaNum1} + ${captchaNum2} = ? *`}
                            </label>
                            <input
                                type="number"
                                required
                                value={captchaInput}
                                onChange={(e) => setCaptchaInput(e.target.value)}
                                className="w-full bg-stone border border-gold/30 rounded p-2.5 text-slate-200 focus:outline-none focus:border-gold"
                                placeholder={language === 'ta' ? "பாதுகாப்பு விடையை உள்ளிடவும்" : "Enter security response"}

                        <button

                ) : (
                    <form onSubmit={handleReviewSubmit} className="space-y-5 text-xs sm:text-sm">
                        <h3 className="text-base sm:text-lg font-bold text-gold font-tamil border-b border-stone pb-2 flex items-center gap-2">

                            திருக்கோவில் அனுபவங்களை பகிர்க
                        </h3>

                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label className="block text-slate-300 font-tamil text-xs mb-1.5">தங்கள் பெயர் (Name) *</label>
                                <input
                                    type="text"
                                    required
                                    value={name}
                                    onChange={(e) => setName(e.target.value)}
                                    className="w-full bg-stone border border-gold/30 rounded p-2.5 text-slate-200 focus:outline-none focus:border-gold font-tamil"
                                    placeholder="பெயர்"
                                />
                            </div>
                            <div>
                                <label className="block text-slate-300 font-tamil text-xs mb-1.5">ஊர் (Place)</label>
                                <input
                                    type="text"
                                    value={place}
                                    onChange={(e) => setPlace(e.target.value)}

                                    placeholder="கோவை, திருச்சி"

                        </div>

                        <div>
                            <label className="block text-slate-300 font-tamil text-xs mb-2">மதிப்பீடு (Rating)</label>
                            <div className="flex gap-2">
                                {[1, 2, 3, 4, 5].map((star) => (
                                    <button
                                        type="button"
                                        key={star}
                                        onClick={() => setRating(star)}
                                        className="focus:outline-none"
                                    >
                                        <Icon
                                            name="star"
                                            className={`w-7 h-7 ${star <= rating ? 'fill-gold text-gold' : 'text-slate-600 hover:text-gold'}`}
                                        />
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div>
                            <label className="block text-slate-300 font-tamil text-xs mb-1.5">தங்களின் அனுபவம் (Experience Description) *</label>
                            <textarea

                                value={exp}
                                onChange={(e) => setExp(e.target.value)}

                                className="w-full bg-stone border border-gold/30 rounded p-3 text-slate-200 focus:outline-none focus:border-gold font-tamil"
                                placeholder="உங்களின் அனுபவங்களை எழுதவும்..."

                        <button
                            type="submit"

                {statusMsg && (
                    <div className="mt-4 p-3 bg-stone border border-gold/20 rounded text-center text-xs text-gold font-tamil">
                        {statusMsg}
                    </div>
                )}

    );
}

// ----------------------------------------------------

function GalleryPage({ t, language, db, saveState }) {
    const [galleryTab, setGalleryTab] = useState('photos'); // 'photos' or 'videos'
    const [filter, setFilter] = useState('All');
    const [uploadOpen, setUploadOpen] = useState(false);
    const [statusMsg, setStatusMsg] = useState("");

    const [imgTitle, setImgTitle] = useState("");
    const [imgCategory, setImgCategory] = useState("Temple");
    const [fileObj, setFileObj] = useState(null);
    const [base64Data, setBase64Data] = useState("");

    // Lightbox states
    const [activePhotoIdx, setActivePhotoIdx] = useState(null); // Index of image in filtered list
    const [activeVideoUrl, setActiveVideoUrl] = useState(null); // Embed URL of active playing video

    const handleFileChange = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        setFileObj(file);
        const reader = new FileReader();
        reader.onloadend = () => {
            setBase64Data(reader.result);
        };
        reader.readAsDataURL(file);
    };

    const handleGalleryUpload = (e) => {
        e.preventDefault();
        if (!imgTitle || !base64Data) {
            alert(language === 'ta' ? "தலைப்பு மற்றும் புகைப்படத்தை தேர்ந்தெடுக்கவும்." : "Please select title and image.");
            return;
        }

        const publishPhoto = (filePath) => {
            const newPhoto = {
                id: "g_" + Date.now(),
                category: imgCategory,
                title: imgTitle,
                url: filePath || base64Data,
                approved: false
            };

            const updatedDb = { ...db };
            updatedDb.gallery = [...(updatedDb.gallery || []), newPhoto];
            saveState(updatedDb);

            setImgTitle("");
            setFileObj(null);
            setBase64Data("");
            setUploadOpen(false);
            setStatusMsg(language === 'ta' ? "புகைப்படம் வெற்றிகரமாக பதிவேற்றப்பட்டது. நிர்வாகி அங்கீகரித்த பின் கேலரியில் தோன்றும்." : "Photo uploaded successfully. It will appear after admin approval.");
            setTimeout(() => setStatusMsg(""), 5000);
        };

        fetch('/api/upload', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: fileObj.name, data: base64Data })
        })
        .then(res => res.json())
        .then(data => {
            publishPhoto(data.filePath);
        })
        .catch(err => {
            console.error("Gallery photo upload failed, using base64 inline", err);
            publishPhoto("");
        });
    };

    // Helper to extract YouTube video ID and build embed/thumbnail URLs
    const getYouTubeInfo = (url) => {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        const videoId = (match && match[2].length === 11) ? match[2] : null;
        if (!videoId) return null;
        return {
            id: videoId,
            embedUrl: `https://www.youtube.com/embed/${videoId}?autoplay=1`,
            thumbnail: `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`
        };
    };

    const categories = ['All', 'Temple', 'Festival', 'Veeramalai', 'Deities', 'Old memories', 'Devotees'];
    const filteredPhotos = db.gallery ? db.gallery.filter(item => item.approved && (filter === 'All' || item.category === filter)) : [];
    const videoItems = db.videos || [];

    // Lightbox slider functions
    const nextPhoto = (e) => {
        e.stopPropagation();
        if (filteredPhotos.length === 0) return;
        setActivePhotoIdx(prev => (prev + 1) % filteredPhotos.length);
    };

    const prevPhoto = (e) => {
        e.stopPropagation();
        if (filteredPhotos.length === 0) return;
        setActivePhotoIdx(prev => (prev - 1 + filteredPhotos.length) % filteredPhotos.length);
    };

    return (
        <div className="max-w-6xl mx-auto px-4 py-16 flex flex-col gap-12">
            
            {/* Gallery Header */}
            <div className="flex flex-col sm:flex-row items-center justify-between gap-4 border-b border-gold/20 pb-6">
                <div>
                    <span className="text-xs bg-kumkum/40 border border-gold/40 text-gold px-3.5 py-1 rounded-full font-tamil">
                        {language === 'ta' ? "திருக்கோவில் புகைப்பட & வீடியோ மாடம்" : "Temple Photo & Video Gallery"}
                    </span>
                    <h2 className="text-2xl sm:text-4xl font-bold font-tamil text-gold-gradient mt-2">
                        {language === 'ta' ? "புகைப்பட & வீடியோ தொகுப்பு" : "Multimedia Media Gallery"}
                    </h2>
                </div>
                {galleryTab === 'photos' && (
                    <button
                        onClick={() => setUploadOpen(true)}
                        className="bg-gold hover:bg-gold-dark text-stone-dark font-tamil font-bold text-xs sm:text-sm py-2.5 px-5 rounded-md flex items-center gap-1 transition shadow-md"
                    >
                        <Icon name="plus" className="w-4 h-4" />
                        {language === 'ta' ? "புகைப்படம் பதிவேற்ற (Upload)" : "Upload Photo"}
                    </button>
                )}
            </div>

            {statusMsg && (
                <div className="p-3 bg-stone border border-gold/20 rounded text-center text-xs text-gold font-tamil">
                    {statusMsg}
                </div>
            )}

            {/* Photos / Videos Toggle Tabs */}
            <div className="flex justify-center border-b border-stone pb-1 mb-2">
                <div className="flex gap-4">
                    <button
                        onClick={() => { setGalleryTab('photos'); setFilter('All'); }}
                        className={`font-tamil font-bold text-sm sm:text-base pb-3 border-b-2 transition ${
                            galleryTab === 'photos' ? 'text-gold border-gold' : 'text-slate-400 border-transparent hover:text-slate-200'
                        }`}
                    >
                        📷 {language === 'ta' ? "புகைப்படங்கள்" : "Photos"}
                    </button>
                    <button
                        onClick={() => setGalleryTab('videos')}
                        className={`font-tamil font-bold text-sm sm:text-base pb-3 border-b-2 transition ${
                            galleryTab === 'videos' ? 'text-gold border-gold' : 'text-slate-400 border-transparent hover:text-slate-200'
                        }`}
                    >
                        🎥 {language === 'ta' ? "வீடியோக்கள் (YouTube)" : "Videos (YouTube)"}
                    </button>
                </div>
            </div>

            {/* Photos tab content */}
            {galleryTab === 'photos' && (
                <div className="space-y-8">
                    {/* Category Filter buttons */}
                    <div className="flex flex-wrap gap-2 justify-center">
                        {categories.map((cat) => (
                            <button
                                key={cat}
                                onClick={() => setFilter(cat)}
                                className={`text-xs font-semibold py-1.5 px-3.5 rounded-full transition-all ${
                                    filter === cat ? 'bg-kumkum text-gold border border-gold' : 'bg-stone border border-stone-light text-slate-400 hover:text-white'
                                }`}
                            >
                                {cat === 'All' ? (language === 'ta' ? 'அனைத்தும்' : 'All') : cat}
                            </button>
                        ))}
                    </div>

                    {/* Photos grid */}
                    {filteredPhotos.length > 0 ? (
                        <div className="columns-1 sm:columns-2 lg:columns-3 gap-4 space-y-4">
                            {filteredPhotos.map((item, idx) => (
                                <div 
                                    key={item.id} 
                                    onClick={() => setActivePhotoIdx(idx)}
                                    className="cursor-pointer break-inside-avoid bg-stone-light border border-gold/20 p-2.5 rounded-lg hover:border-gold/60 transition group relative overflow-hidden shadow-sm"
                                >
                                    <img
                                        src={item.url}
                                        alt={item.title}
                                        className="w-full h-auto object-cover rounded"
                                        loading="lazy"
                                    />
                                    <div className="absolute inset-x-2.5 bottom-2.5 p-3 rounded bg-stone-dark/85 border border-gold/25 opacity-0 group-hover:opacity-100 transition duration-300">
                                        <h4 className="font-tamil font-bold text-xs sm:text-sm text-gold-gradient">{item.title}</h4>
                                        <span className="text-[10px] text-slate-400 font-tamil">{item.category}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    ) : (
                        <p className="text-center text-slate-400 font-tamil text-sm py-12">{language === 'ta' ? "புகைப்படங்கள் ஏதும் இல்லை." : "No photos available in this category."}</p>
                    )}
                </div>
            )}

            {/* Videos tab content */}
            {galleryTab === 'videos' && (
                <div className="space-y-6">
                    {videoItems.length > 0 ? (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                            {videoItems.map((vid) => {
                                const info = getYouTubeInfo(vid.url);
                                if (!info) return null;
                                return (
                                    <div 
                                        key={vid.id} 
                                        onClick={() => setActiveVideoUrl(info.embedUrl)}
                                        className="cursor-pointer bg-stone-light border border-gold/20 rounded-lg overflow-hidden hover:border-gold/60 transition group shadow-md"
                                    >
                                        {/* Video Thumbnail with overlay play icon */}
                                        <div className="relative aspect-video bg-black overflow-hidden">
                                            <img 
                                                src={info.thumbnail} 
                                                alt={vid.title} 
                                                className="w-full h-full object-cover group-hover:scale-105 transition duration-500" 
                                            />
                                            <div className="absolute inset-0 bg-black/40 flex items-center justify-center group-hover:bg-black/20 transition">
                                                <div className="w-12 h-12 bg-red-600 group-hover:bg-red-500 rounded-full flex items-center justify-center text-white shadow-lg transition-transform group-hover:scale-110">
                                                    <svg viewBox="0 0 24 24" fill="currentColor" className="w-6 h-6 ml-0.5">
                                                        <path d="M8 5v14l11-7z" />
                                                    </svg>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="p-4 bg-stone/40">
                                            <h4 className="font-tamil font-bold text-xs sm:text-sm text-gold group-hover:text-gold-light transition">{vid.title}</h4>
                                            <span className="text-[10px] text-slate-400 mt-1 block font-tamil">{language === 'ta' ? "தினசரி தரிசனம் / நேரலை" : "Daily Ritual / Live Video"}</span>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    ) : (
                        <p className="text-center text-slate-400 font-tamil text-sm py-12">{language === 'ta' ? "வீдеоக்கள் ஏதும் இல்லை." : "No videos available."}</p>
                    )}
                </div>
            )}

            {/* Photo Lightbox Fullscreen Modal */}
            {activePhotoIdx !== null && filteredPhotos[activePhotoIdx] && (
                <div className="fixed inset-0 z-[100] bg-black/95 backdrop-blur flex items-center justify-center" onClick={() => setActivePhotoIdx(null)}>
                    <button 
                        type="button"
                        onClick={() => setActivePhotoIdx(null)}
                        className="absolute top-4 right-4 text-gold hover:text-white p-2.5 z-[110]"
                        aria-label="Close Lightbox"
                    >
                        <Icon name="x" className="w-8 h-8" />
                    </button>

                    {/* Navigation Arrows */}
                    <button 
                        type="button"
                        onClick={prevPhoto}
                        className="absolute left-4 top-1/2 -translate-y-1/2 text-gold hover:text-white bg-stone-dark/50 border border-gold/30 p-3 rounded-full hover:bg-gold hover:text-stone-dark z-[110] transition"
                        aria-label="Previous Photo"
                    >
                        <Icon name="chevronLeft" className="w-6 h-6" />
                    </button>
                    <button 
                        type="button"
                        onClick={nextPhoto}
                        className="absolute right-4 top-1/2 -translate-y-1/2 text-gold hover:text-white bg-stone-dark/50 border border-gold/30 p-3 rounded-full hover:bg-gold hover:text-stone-dark z-[110] transition"
                        aria-label="Next Photo"
                    >
                        <Icon name="chevronRight" className="w-6 h-6" />
                    </button>

                    {/* Image Contain Box */}
                    <div className="max-w-4xl max-h-[85vh] w-full px-4 flex flex-col items-center justify-center gap-4" onClick={e => e.stopPropagation()}>
                        <img 
                            src={filteredPhotos[activePhotoIdx].url} 
                            alt={filteredPhotos[activePhotoIdx].title}

                        <form onSubmit={handleGalleryUpload} className="space-y-4 text-xs sm:text-sm">

                                <label className="block text-slate-300 font-tamil text-xs mb-1.5">{language === 'ta' ? "படத்தின் தலைப்பு (Title) *" : "Photo Title *"}</label>
                                <input
                                    type="text"
                                    required
                                    value={imgTitle}
                                    onChange={(e) => setImgTitle(e.target.value)}
                                    className="w-full bg-stone border border-gold/30 rounded p-2.5 text-slate-200 focus:outline-none focus:border-gold font-tamil"
                                    placeholder={language === 'ta' ? "தலைப்பு" : "Enter Title"}
                                />
                            </div>

                            <div>
                                <label className="block text-slate-300 font-tamil text-xs mb-1.5">{language === 'ta' ? "பிரிவு (Category)" : "Category"}</label>
                                <select
                                    value={imgCategory}
                                    onChange={(e) => setImgCategory(e.target.value)}
                                    className="w-full bg-stone border border-gold/30 rounded p-2.5 text-slate-200 focus:outline-none focus:border-gold font-tamil"
                                >
                                    <option value="Temple">Temple (கோவில்)</option>
                                    <option value="Festival">Festival (திருவிழா)</option>
                                    <option value="Veeramalai">Veeramalai (வீரமலை)</option>
                                    <option value="Deities">Deities (தெய்வங்கள்)</option>
                                    <option value="Old memories">Old memories (பழைய நினைவுகள்)</option>
                                    <option value="Devotees">Devotees (பக்தர்கள்)</option>
                                </select>
                            </div>

                            <div>
                                <label className="block text-slate-300 font-tamil text-xs mb-1.5">{language === 'ta' ? "புகைப்படம் தேர்ந்தெடுக்கவும் (Select Image) *" : "Select Image File *"}</label>
                                <input
                                    type="file"
                                    accept="image/*"
                                    required
                                    onChange={handleFileChange}
                                    className="w-full bg-stone border border-gold/30 rounded p-2 text-slate-400 text-xs focus:outline-none focus:border-gold"
                                />
                            </div>

                            <button
                                type="submit"
                                className="w-full bg-gold hover:bg-gold-dark text-stone-dark font-tamil font-bold py-2.5 rounded transition"
                            >
                                {language === 'ta' ? "பதிவேற்று (Upload)" : "Submit Upload"}
                            </button>
                        </form>
                    </div>
                </div>
            )}
        </div>
    );
}

// ----------------------------------------------------

function AdminPanel({ t, language, db, saveState, adminLoggedIn, setAdminLoggedIn }) {

                setHistoryBase64("");

    const [festBase64, setFestBase64] = useState("");
    const [festFileObj, setFestFileObj] = useState(null);

    const [stepTime, setStepTime] = useState("");
    const [stepDesc, setStepDesc] = useState("");

        e.preventDefault();

            id: "lu_" + Date.now(),
            date: new Date().toISOString().split('T')[0],
            time: new Date().toLocaleTimeString('ta-IN', { hour: '2-digit', minute: '2-digit' }),

            type: "info"
        };

            return;
        }
        const newStep = {
            event: stepEvent,
            date: stepDate || "தேதி",
            time: stepTime || "நேரம்",
            desc: stepDesc || ""
        };
        setTempSchedule([...tempSchedule, newStep]);
        setStepEvent("");
        setStepDate("");
        setStepTime("");
        setStepDesc("");
    };

    const handleRemoveScheduleStep = (idx) => {

        e.preventDefault();
        if (!festTitle || !festDate) {

        })
        .then(res => {
            if (res.status === 200) return res.json();

                    num: nextNum,

                    content: historyContent,
                    titleEn: historyTitleEn,
                    contentEn: historyContentEn,
                    image: filePath || historyBase64 || "/assets/images/srpkamn.PNG"
                };
                updatedDb.history = [...(updatedDb.history || []), newChap];
                setSelectedHistoryChap(nextNum);
                alert("புதிய வரலாற்று அத்தியாயம் வெற்றிகரமாக சேர்க்கப்பட்டது!");
            } else {
                updatedDb.history = updatedDb.history.map(chap => {
                    if (chap.num === Number(selectedHistoryChap)) {

                            ...chap,
                            title: historyTitle,
                            content: historyContent,
                            titleEn: historyTitleEn,
                            contentEn: historyContentEn,

            .then(res => res.json())

                                        </div>
                                        <span className={`text-[10px] px-2 py-0.5 rounded inline-block ${img.approved ? 'bg-green-950/40 text-green-500' : 'bg-amber-950/40 text-amber-500'}`}>
                                            {img.approved ? 'Approved' : 'Pending Review'}
                                        </span>
                                    </div>

                                    <div className="flex gap-2">
                                        {!img.approved && (
                                            <button onClick={() => handleModerateGallery(img.id, true)} className="flex-1 bg-green-700 hover:bg-green-600 text-white font-tamil text-xs py-1 rounded">Approve</button>
                                        )}
                                        <button onClick={() => handleModerateGallery(img.id, false)} className="flex-1 bg-red-950 hover:bg-red-900 text-gold font-tamil text-xs py-1 rounded">Delete</button>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* Video Gallery Management */}
                        <div className="border-t border-stone pt-6 mt-8 space-y-4">
                            <h4 className="font-bold text-gold font-tamil border-b border-stone pb-2">யூடியூப் வீடியோக்கள் மேலாண்மை (Manage Videos)</h4>
                            
                            {/* Video Add Form */}
                            <form onSubmit={handleAddVideoDirect} className="bg-stone border border-gold/30 p-5 rounded space-y-4 text-xs sm:text-sm">
                                <h5 className="font-bold text-gold font-tamil border-b border-stone pb-2">புதிய வீடியோ சேர்க்க</h5>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-slate-300 font-tamil text-xs mb-1">வீடியோவின் தலைப்பு (Video Title) *</label>
                                        <input 
                                            type="text" 
                                            value={videoTitle} 
                                            onChange={e => setVideoTitle(e.target.value)} 
                                            required 
                                            className="w-full bg-stone-light border border-gold/30 rounded p-2.5 text-slate-200 font-tamil" 
                                            placeholder="தலைப்பு" 
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-slate-300 font-tamil text-xs mb-1">YouTube URL (இணைப்பு) *</label>
                                        <input 
                                            type="url" 
                                            value={videoUrl} 
                                            onChange={e => setVideoUrl(e.target.value)} 
                                            required 
                                            className="w-full bg-stone-light border border-gold/30 rounded p-2.5 text-slate-200" 
                                            placeholder="https://www.youtube.com/watch?v=..." 
                                        />
                                    </div>
                                </div>
                                <button type="submit" className="bg-gold hover:bg-gold-dark text-stone-dark font-tamil font-bold px-6 py-2 rounded text-xs transition">வீடியோ சேர் (Add Video)</button>
                            </form>

                            {/* Video List */}
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 pt-4">
                                {(db.videos || []).map((vid) => (
                                    <div key={vid.id} className="bg-stone border border-gold/15 p-4 rounded-lg flex flex-col justify-between gap-3">
                                        <div>
                                            <h5 className="font-bold font-tamil text-xs text-slate-100">{vid.title}</h5>
                                            <p className="text-[10px] text-slate-400 truncate mt-1">{vid.url}</p>
                                        </div>
                                        <button 
                                            type="button"
                                            onClick={() => handleDeleteVideoDirect(vid.id)} 
                                            className="bg-red-950 hover:bg-red-900 text-gold font-tamil text-xs py-1 rounded w-full"
                                        >
                                            🗑️ வீடியோவை நீக்கு (Delete Video)
                                        </button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                )}

            </div>
        </div>
    );
}

// ----------------------------------------------------
// Mounting the React application
// ----------------------------------------------------
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
</body>
</html>
